task: >
  LUFFY LAW — LOG EVERYTHING.
  Append start entry to logs/luffy-journal.jsonl before any action.

  STEP 1 — Install: pip install tree-sitter==0.21.3. Log result.
  STEP 2 — Build grammar: python scripts/build_grammar.py
    Clones janus-llm/tree-sitter-mumps and compiles to tools/mumps/build/mumps.so.
  STEP 3 — Verify: python -c "from tree_sitter import Language; L=Language('tools/mumps/build/mumps.so','mumps'); print('GRAMMAR OK')"
    If fails, halt. Open ISSUE.md.
  STEP 4 — Write result: "MUM-T01 CLOSED: grammar compiled" to logs/MUM-T01-result.txt.
acceptance_criteria:
  command: "test -f tools/mumps/build/mumps.so && echo PASS || echo FAIL"
