# MUMPS_Bot — Executor Runtime Configuration
#
# executor-agnostic. No hardware refs hardcoded.
# Set executor.endpoint and executor.model to match your local runtime.
#
# Ollama (default):
#   executor.endpoint: http://localhost:11434
#   executor.format: ollama
#   executor.model: gemma4  (or whatever model you have pulled)
#
# OpenAI-compatible:
#   executor.endpoint: http://localhost:<port>/api/v1
#   executor.format: openai-compat
#   executor.model: <model-name>

executor:
  endpoint: http://localhost:11434
  format: ollama                     # ollama | openai-compat
  model: gemma4                      # set to your pulled model name
  api_key: ""
  temperature: 0.2
  max_tokens: 4096
  decompose_budget: 2048
  output_budget_pct: 0.8
  context_window: 128000
  timeout_seconds: 180
  max_retries: 2
  stream: false

  # ALLOWED TOOLS — must exactly match tools listed in tools/toolbox.yaml (stage: active)
  # and registered in scripts/run_tool.py ALLOWED_TOOLS set.
  # Do NOT add a tool here unless its physical file exists and it has an active ticket.
  # Updated 2026-04-10: removed phantom tools (read_file, write_file, exec_python,
  # list_dir, terminal) that never existed. See deprecated/ for history.
  allowed_tools:
    - normalize_mumps
    - parse_mumps
    - list_entry_points
    - build_ir
    - emit_python_stub
    - journal_writer
    - run_tool
    - next_ticket
    - close_ticket
    - check_skeleton

  forbidden_tools:
    - browser
    - web_fetch
    - computer_use
    - code_interpreter
    - extract_globals
    - extract_calls
    - query_ast
    - summarize_routine

agent:
  stage: rook     # bud | branch | planted | rooted | rook

tickets:
  open_dir: tickets/open
  in_progress_dir: tickets/in_progress
  closed_dir: tickets/closed
  failed_dir: tickets/failed
  template: tickets/template.yaml
  max_open: 5
  max_retries_default: 2

validation:
  unit: "pytest -q tests/"
  lint: "# ruff check — enable when src/ exists"
  type: "# mypy — enable when src/ exists"
  docs: "# spec_check — enable when tools/spec_check.py exists"

logging:
  dir: logs/
  journal: logs/luffy-journal.jsonl
  session_pattern: "logs/session_{date}.jsonl"
  gitignore: true
  max_logs: 100
  min_retain: 10
  keep_escalated: true
