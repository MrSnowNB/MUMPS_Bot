# MUMPS_Bot — Executor Runtime Configuration
#
# This file is executor-agnostic. No model names, hardware refs, or endpoint
# URLs are hardcoded here. Set executor.endpoint to whatever is running locally.
#
# For Ollama (default):
#   executor.endpoint: http://localhost:11434
#   executor.format: ollama
#
# For any OpenAI-compatible endpoint:
#   executor.endpoint: http://localhost:<port>/api/v1
#   executor.format: openai-compat
#
# Budget policy:
#   BUDGET_FLOOR      = 1024 tokens  (minimum for reasoning + tool block)
#   BUDGET_CEILING    = context_window * output_budget_pct
#   token_budget()    = dynamic per-ticket, bounded by floor/ceiling
#   max_tokens        = hard output cap for runaway prevention

executor:
  endpoint: http://localhost:11434   # override for your local runtime
  format: ollama                     # ollama | openai-compat
  api_key: ""
  temperature: 0.2
  max_tokens: 4096
  decompose_budget: 2048
  output_budget_pct: 0.8
  context_window: 128000
  timeout_seconds: 180
  max_retries: 2
  stream: false
  allowed_tools:
    - read_file
    - write_file
    - exec_python
    - list_dir
    - shell
  forbidden_tools:
    - browser
    - web_fetch
    - computer_use
    - code_interpreter

agent:
  stage: bud     # bud | branch | planted | rooted

tickets:
  open_dir: tickets/open
  in_progress_dir: tickets/in_progress
  closed_dir: tickets/closed
  failed_dir: tickets/failed
  template: tickets/template.yaml
  max_open: 5
  max_retries_default: 2

validation:
  unit: "pytest -q tests/"
  lint: "ruff check src/"
  type: "mypy src/"
  docs: "python tools/spec_check.py"

logging:
  dir: logs/
  journal: logs/journal.md
  session_pattern: "logs/session_{date}.jsonl"
  gitignore: true
  max_logs: 100
  min_retain: 10
  keep_escalated: true
